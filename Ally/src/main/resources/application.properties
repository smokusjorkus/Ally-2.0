# Swagger UI configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true

spring.application.name=ally
spring.main.lazy-initialization=${SPRING_LAZY_INITIALIZATION:true}

server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ally}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}

# Railway Database Configuration
# spring.datasource.url=${DB_URL}
# spring.datasource.username=root
# spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.data.jpa.repositories.bootstrap-mode=${JPA_REPOSITORY_BOOTSTRAP_MODE:lazy}


# OAuth2 Client Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=https://www.googleapis.com/auth/userinfo.email,https://www.googleapis.com/auth/userinfo.profile,profile
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL:http://localhost:8080}/login/oauth2/code/google

server.error.include-stacktrace=never

# DeepSeek AI Chat Configuration
deepseek.api-key=${DEEPSEEK_API_KEY:}
deepseek.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com}
deepseek.model=${DEEPSEEK_MODEL:deepseek-chat}

