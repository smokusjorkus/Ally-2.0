# Firebase config
firebase.service.account.path=${FIREBASE_KEY_PATH:}
firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:ally-2-3936e.firebasestorage.app}
storage.type=${STORAGE_TYPE:local}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

google.service.account.path=${GOOGLE_SERVICE_ACCOUNT_PATH:file:/etc/secrets/service-account-key.json}

# Firebase Configuration
